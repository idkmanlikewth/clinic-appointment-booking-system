<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Clinic Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<nav class="navbar navbar-expand-md app-navbar">

    <div class="container">

        <a class="navbar-brand" href="/">
            <i class="bi bi-hospital"></i>
            Clinic Management
        </a>

        <button class="navbar-toggler border-0 text-white" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMenu">
            <i class="bi bi-list text-white fs-2"></i>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">

            <div class="navbar-nav me-auto ms-md-4 mt-2 mt-md-0">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/doctors">Doctors</a>
                <a class="nav-link nav-patient" href="/appointments">Appointments</a>
                <a class="nav-link nav-doctor" href="/doctor/dashboard" style="display:none;">My Dashboard</a>
            </div>

            <div id="auth-area" class="d-flex align-items-center gap-2 mt-3 mt-md-0">
                <!-- populated by JS based on login state -->
            </div>

        </div>

    </div>

</nav>

<main>
    <div class="page-wrap">
        {% block body %}
        {% endblock %}
    </div>
</main>

<footer class="app-footer">
    Clinic Management System &middot; built with FastAPI
</footer>

<div id="app-toast" class="app-toast"></div>

<script>

// ---------- shared auth helpers ----------

function getToken() {
    return localStorage.getItem("access_token");
}

function getUserEmail() {
    const token = getToken();
    if (!token) return null;
    try {
        const payload = JSON.parse(atob(token.split(".")[1]));

        if (payload.exp && Date.now() >= payload.exp * 1000) {
            // token expired — clear it so we don't show a false logged-in state
            localStorage.removeItem("access_token");
            localStorage.removeItem("refresh_token");
            return null;
        }

        return payload.sub || null;
    } catch (e) {
        return null;
    }
}

function logout() {
    localStorage.removeItem("access_token");
    localStorage.removeItem("refresh_token");
    window.location.href = "/";
}

function renderAuthArea() {
    const area = document.getElementById("auth-area");
    const email = getUserEmail();
    const role = localStorage.getItem("user_role") || "patient";

    // Show correct nav link based on role
    document.querySelectorAll(".nav-doctor").forEach(function(el) {
        el.style.display = (email && role === "doctor") ? "" : "none";
    });
    document.querySelectorAll(".nav-patient").forEach(function(el) {
        el.style.display = (email && role === "doctor") ? "none" : "";
    });

    if (!area) return;

    if (email) {
        const initial = email.charAt(0).toUpperCase();
        const roleLabel = role === "doctor" ? "Doctor" : "Patient";
        area.innerHTML = `
            <span class="navbar-user-pill">
                <span class="avatar-dot ${role === "doctor" ? "avatar-doctor" : ""}">${initial}</span>
                ${email}
                <span class="role-pill">${roleLabel}</span>
            </span>
            <button id="logout-btn" class="btn btn-nav-outline btn-sm">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        `;
        document.getElementById("logout-btn").addEventListener("click", logout);
    } else {
        area.innerHTML = `
            <a href="/login" class="btn btn-nav-outline btn-sm">Login</a>
            <a href="/signup" class="btn btn-nav-solid btn-sm">Sign Up</a>
        `;
    }
}

function showToast(message, type) {
    const toast = document.getElementById("app-toast");
    if (!toast) return;
    toast.textContent = message;
    toast.className = "app-toast show " + (type === "error" ? "toast-error" : "toast-success");
    setTimeout(function () {
        toast.classList.remove("show");
    }, 3200);
}

function markActiveNavLink() {
    const path = window.location.pathname;
    document.querySelectorAll(".app-navbar .nav-link").forEach(function (link) {
        if (link.getAttribute("href") === path) {
            link.classList.add("active");
        }
    });
}

renderAuthArea();
markActiveNavLink();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}{% endblock %}

</body>

</html>
