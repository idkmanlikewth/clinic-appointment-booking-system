{% extends "layout.html" %}

{% block body %}

<div class="form-container">

    <div class="form-icon" id="form-icon"><i class="bi bi-person-plus"></i></div>

    <h2 id="form-title">Create your account</h2>
    <p class="form-subtitle" id="form-subtitle">Sign up to start booking appointments</p>

    <div class="role-tabs">
        <button class="role-tab active" id="tab-patient" onclick="switchRole('patient')">
            <i class="bi bi-person-heart"></i> Patient
        </button>
        <button class="role-tab" id="tab-doctor" onclick="switchRole('doctor')">
            <i class="bi bi-person-badge"></i> Doctor
        </button>
    </div>

    <div id="signup-error" class="alert alert-danger" style="display:none;"></div>
    <div id="signup-success" class="alert alert-success" style="display:none;"></div>

    <form id="signup-form">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Jane Doe" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="mb-3" id="spec-field" style="display:none;">
            <label class="form-label">Specialization</label>
            <input type="text" name="specialization" class="form-control" placeholder="e.g. Cardiology">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button class="btn btn-success w-100 text-white">
            <i class="bi bi-person-check"></i> Register
        </button>

    </form>

    <p class="form-footer-note">
        Already have an account? <a href="/login" id="login-link">Log in</a>
    </p>

</div>

{% endblock %}

{% block scripts %}
<script>
let currentRole = 'patient';

function switchRole(role) {
    currentRole = role;
    const isDoctor = role === 'doctor';
    document.getElementById('tab-patient').classList.toggle('active', !isDoctor);
    document.getElementById('tab-doctor').classList.toggle('active', isDoctor);
    document.getElementById('form-icon').innerHTML = isDoctor
        ? '<i class="bi bi-person-badge"></i>' : '<i class="bi bi-person-plus"></i>';
    document.getElementById('form-icon').className = 'form-icon' + (isDoctor ? ' icon-doctor' : '');
    document.getElementById('form-title').textContent = isDoctor ? 'Doctor Registration' : 'Create your account';
    document.getElementById('form-subtitle').textContent = isDoctor
        ? 'Register to manage your clinic appointments' : 'Sign up to start booking appointments';
    document.getElementById('spec-field').style.display = isDoctor ? 'block' : 'none';
    document.querySelector('[name="specialization"]').required = isDoctor;
    document.getElementById('login-link').href = isDoctor ? '/login?role=doctor' : '/login';
}

const urlRole = new URLSearchParams(window.location.search).get('role');
if (urlRole === 'doctor') switchRole('doctor');

document.getElementById('signup-form').addEventListener('submit', async function (e) {
    e.preventDefault();

    const errorBox = document.getElementById('signup-error');
    const successBox = document.getElementById('signup-success');
    errorBox.style.display = 'none';
    successBox.style.display = 'none';

    const isDoctor = currentRole === 'doctor';
    const endpoint = isDoctor ? '/doctor/signup' : '/user/signup';

    const payload = {
        username: this.username.value,
        email: this.email.value,
        password: this.password.value
    };
    if (isDoctor) payload.specialization = this.specialization.value;

    try {
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
            errorBox.textContent = data.detail || 'Signup failed';
            errorBox.style.display = 'block';
            return;
        }

        successBox.textContent = 'Account created! Redirecting to login...';
        successBox.style.display = 'block';

        setTimeout(function () {
            window.location.href = isDoctor ? '/login?role=doctor' : '/login';
        }, 1200);

    } catch (err) {
        errorBox.textContent = 'Something went wrong. Please try again.';
        errorBox.style.display = 'block';
    }
});
</script>
{% endblock %}
