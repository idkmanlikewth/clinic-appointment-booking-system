{% extends "layout.html" %}

{% block body %}

<div class="form-container">

    <div class="form-icon" id="form-icon"><i class="bi bi-person-circle"></i></div>

    <h2 id="form-title">Welcome back</h2>
    <p class="form-subtitle" id="form-subtitle">Log in to manage your appointments</p>

    <div class="role-tabs">
        <button class="role-tab active" id="tab-patient" onclick="switchRole('patient')">
            <i class="bi bi-person-heart"></i> Patient
        </button>
        <button class="role-tab" id="tab-doctor" onclick="switchRole('doctor')">
            <i class="bi bi-person-badge"></i> Doctor
        </button>
    </div>

    <div id="login-error" class="alert alert-danger" style="display:none;"></div>

    <form id="login-form">

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="username" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button class="btn btn-primary w-100 text-white">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </button>

    </form>

    <p class="form-footer-note">
        Don't have an account? <a href="/signup" id="signup-link">Sign up</a>
    </p>

</div>

{% endblock %}

{% block scripts %}
<script>
let currentRole = 'patient';

function switchRole(role) {
    currentRole = role;
    const isDoctor = role === 'doctor';
    document.getElementById('tab-patient').classList.toggle('active', !isDoctor);
    document.getElementById('tab-doctor').classList.toggle('active', isDoctor);
    document.getElementById('form-icon').innerHTML = isDoctor
        ? '<i class="bi bi-person-badge"></i>' : '<i class="bi bi-person-circle"></i>';
    document.getElementById('form-icon').className = 'form-icon' + (isDoctor ? ' icon-doctor' : '');
    document.getElementById('form-title').textContent = isDoctor ? 'Doctor Portal' : 'Welcome back';
    document.getElementById('form-subtitle').textContent = isDoctor
        ? 'Log in to view your appointments' : 'Log in to manage your appointments';
    document.getElementById('signup-link').href = isDoctor ? '/signup?role=doctor' : '/signup';
}

const urlRole = new URLSearchParams(window.location.search).get('role');
if (urlRole === 'doctor') switchRole('doctor');

document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();

    const errorBox = document.getElementById('login-error');
    errorBox.style.display = 'none';

    const formData = new URLSearchParams();
    formData.append('username', this.username.value);
    formData.append('password', this.password.value);

    const endpoint = currentRole === 'doctor' ? '/doctor/login' : '/user/login';

    try {
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });

        const data = await response.json();

        if (!response.ok) {
            errorBox.textContent = data.detail || 'Login failed';
            errorBox.style.display = 'block';
            return;
        }

        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        localStorage.setItem('user_role', currentRole);

        window.location.href = currentRole === 'doctor' ? '/doctor/dashboard' : '/doctors';

    } catch (err) {
        errorBox.textContent = 'Something went wrong. Please try again.';
        errorBox.style.display = 'block';
    }
});
</script>
{% endblock %}
